<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZED-KITCHEN | طابونة 5×1</title>
<style>
body { font-family: Arial; direction: rtl; margin: 0; background: #f4f4f4; }
header { background: linear-gradient(to left,#b22222,#ff4500); color:white; text-align:center; padding:50px 20px; }
header h1 { margin:0; font-size:32px; }
header p { font-size:18px; }
.section { padding:30px; text-align:center; }
.section img { width:300px; max-width:100%; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.15); margin-bottom:20px; }
.price { font-size:30px; color:#b22222; font-weight:bold; }
.free { color:green; font-weight:bold; font-size:18px; }
form { background:white; max-width:400px; margin:20px auto; padding:20px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1); }
input, button { width:100%; padding:14px; margin:10px 0; font-size:16px; border-radius:8px; }
input { border:1px solid #ccc; }
input:focus { outline:none; border:1px solid #b22222; box-shadow:0 0 5px rgba(178,34,34,0.4); }
button { background:#b22222; color:white; border:none; cursor:pointer; transition:0.3s; }
button:hover { background:#8b0000; }
</style>
</head>
<body>

<header>
<h1>🔥 5×1 طابونة عصرية 🔥</h1>
<p>أفضل طابونة متعددة الاستعمالات في الجزائر</p>
</header>

<section class="section">
<img src="https://via.placeholder.com/300.png" alt="صورة الطابونة">
</section>

<section class="section">
<p class="price">السعر: 15000 دج</p>
<p class="free">🚚 التوصيل مجاني إلى باب المنزل</p>
<p>💰 الدفع عند الاستلام</p>
</section>

<section class="section">
<h2>📦 اطلب الآن</h2>
<form id="orderForm">
<input type="text" id="nom" placeholder="الاسم" required>
<input type="text" id="prenom" placeholder="اللقب" required>
<input type="text" id="wilaya" placeholder="الولاية" required>
<input type="text" id="commune" placeholder="البلدية / الحي" required>
<input type="tel" id="telephone" placeholder="رقم الهاتف" required>
<button type="submit">تأكيد الطلب</button>
</form>
</section>

<script>
document.getElementById("orderForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const btn = document.querySelector("button");
    btn.disabled = true; btn.innerText = "جارٍ إرسال الطلب...";

    const fields = ["nom", "prenom", "wilaya", "commune", "telephone"];
    const data = {};
    fields.forEach(id => {
        const el = document.getElementById(id);
        data[id] = el ? el.value.trim() : "";
    });

    try {
    
        const response = await fetch("https://script.google.com/macros/s/AKfycbzWcwqAjtElyZhTG9EY450-LIkYuNMZ8GTh9vIsewLapx3alSYdKeHwu-Lo-T4iTI9OhQ/exec", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify(data)
});

        const result = await response.json();
        if(result.result === "success"){
            alert("✅ تم تسجيل طلبك بنجاح!");
            document.getElementById("orderForm").reset();
        } else {
            alert("❌ حدث خطأ في الإرسال");
        }
    } catch(err){
        alert("❌ حدث خطأ، تأكد من رابط Google Script");
    }

    btn.disabled = false;
    btn.innerText = "تأكيد الطلب";
});
</script>

</body>

</html>
